<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schwep</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="p-head">
      <img class="p-blimp" id="blimp-img" alt="Schwep blimp" />
      <div class="p-brand">Schwep<span class="p-dot">.</span></div>
      <div class="p-tagline">Your taste → technical blueprint</div>
    </header>

    <!-- CTA -->
    <section class="p-section">
      <div class="p-message">Open an AI chat to use the Schwep engine</div>
      <div class="p-links">
        <a class="p-link" href="https://chatgpt.com" target="_blank" rel="noopener">
          <span class="p-link-name">ChatGPT</span>
          <span class="p-link-arrow">→</span>
        </a>
        <a class="p-link" href="https://claude.ai" target="_blank" rel="noopener">
          <span class="p-link-name">Claude</span>
          <span class="p-link-arrow">→</span>
        </a>
        <a class="p-link" href="https://gemini.google.com" target="_blank" rel="noopener">
          <span class="p-link-name">Gemini</span>
          <span class="p-link-arrow">→</span>
        </a>
      </div>
    </section>

    <!-- How it works -->
    <section class="p-section p-how">
      <div class="p-how-title">How it works</div>
      <div class="p-steps">
        <div class="p-step"><span class="p-step-num">1</span>Open an AI chat</div>
        <div class="p-step"><span class="p-step-num">2</span>Click the blimp</div>
        <div class="p-step"><span class="p-step-num">3</span>Swipe 4 rounds</div>
        <div class="p-step"><span class="p-step-num">4</span>Insert your blueprint</div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="p-foot">
      <a class="p-site-link" href="https://schwep.com" target="_blank" rel="noopener">schwep.com</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
